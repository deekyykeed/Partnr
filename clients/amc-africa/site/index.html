<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMC Africa — Mining Consultants</title>
  <meta name="description" content="African Mining Consultants — 30 years of mining and exploration engineering across sub-Saharan Africa.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script type="module" src="https://cdn.jsdelivr.net/npm/@hugeicons/core-free@0.0.5/dist/index.esm.js"></script>
  <link rel="stylesheet" href="css/button.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <!-- NAV -->
  <header class="nav" id="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">AMC <span class="nav-sep">/</span> Africa</a>
      <nav class="nav-links" id="navLinksWrap" aria-label="Main navigation">
        <a href="#services">Services</a>
        <a href="#projects">Projects</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
        <a href="#contact" class="p-btn p-btn--sm nav-cta">Book a Call</a>
      </nav>
      <button class="nav-toggle" id="navToggle" aria-label="Open navigation" aria-expanded="false" aria-controls="navLinksWrap">
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero" id="home">

    <div class="hero-bg" aria-hidden="true">
      <img src="assets/hero/hero-bg.png" alt="" class="hero-bg-img">
    </div>
    <div class="hero-gradient" aria-hidden="true"></div>

    <div class="hero-container">
      <div class="hero-copy">
        <h1 class="hero-hl">
          Africa's <em>best</em><br>Mining Experts
        </h1>
        <p class="hero-sub">
          30 years of mining, exploration, and environmental engineering — built on the Zambian Copperbelt, trusted across sub-Saharan Africa.
        </p>
        <div class="hero-ctas">
          <a href="#contact" class="amc-btn amc-btn--primary">
            <span class="amc-btn-label">Book a Free Call</span>
            <span class="amc-btn-icon">
              <img src="https://cdn.hugeicons.com/icons/arrow-right-01-stroke-rounded.svg" alt="" width="16" height="16">
            </span>
          </a>
          <a href="#services" class="amc-btn amc-btn--secondary">
            <span class="amc-btn-label">See Our Work</span>
          </a>
        </div>
      </div>
    </div><!-- /hero-container -->

    <!-- Clients bar — pinned to bottom of hero -->
    <div class="clients-bar">
      <div class="clients-blur" aria-hidden="true"></div>
      <span class="clients-label">Proudly worked with</span>
      <div class="clients-logos">
        <img src="assets/logos/Glencore_logo-white.svg" alt="Glencore" class="client-logo">
        <img src="assets/logos/anglo-american-logo-color.svg" alt="Anglo American" class="client-logo">
        <img src="assets/logos/First_Quantum_Minerals_New_Logo.svg.png" alt="First Quantum Minerals" class="client-logo">
        <span class="client-text">Lonmin</span>
        <span class="client-text">Rio Algom</span>
        <span class="client-text">ZCCM&#8209;IH</span>
      </div>
    </div>

  </section>

  <script src="js/main.js"></script>
</body>
</html>
